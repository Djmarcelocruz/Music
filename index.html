<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DJ Radar – Edição YouTube Pro</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --text: #e0e0e0;
      --text2: #aaa;
      --accent: #ff5500;
      --accent2: #ff7b33;
      --youtube: #ff0000;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; padding-bottom: 110px; }
    .app { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
    header { display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), #ffaa00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* Painel de Configuração da Chave */
    .key-panel { background: #1a0d00; border: 1px solid var(--accent); padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 8px; }
    .key-panel label { font-size: 0.8rem; color: var(--accent2); font-weight: bold; }
    .key-box { display: flex; gap: 8px; }
    .key-box input { flex: 1; padding: 8px; border-radius: 6px; border: none; background: var(--surface2); color: #fff; font-size: 0.85rem; }
    .key-box button { background: var(--accent); color: white; border: none; padding: 0 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }

    .search-container { display: flex; flex-direction: column; gap: 8px; background: var(--surface); padding: 12px; border-radius: 14px; }
    .search-box { display: flex; gap: 8px; flex-wrap: wrap; }
    .search-box input { flex: 2; min-width: 180px; padding: 10px; border-radius: 10px; border: none; background: var(--surface2); color: var(--text); font-size: 0.95rem; }
    .search-box button { background: var(--accent); color: white; border: none; padding: 0 16px; height: 42px; border-radius: 10px; font-weight: 600; cursor: pointer; }
    .search-box select { flex: 1; min-width: 130px; padding: 10px; border-radius: 10px; border: none; background: var(--surface2); color: var(--text); font-size: 0.85rem; cursor: pointer; }

    .control-bar { display: flex; gap: 8px; flex-wrap: wrap; background: var(--surface); padding: 8px; border-radius: 12px; }
    .control-btn { flex: 1; min-width: 100px; background: var(--surface2); border: 1px solid #333; color: var(--text); padding: 8px; border-radius: 8px; font-size: 0.8rem; cursor: pointer; font-weight: 600; text-align: center; }
    .control-btn.active { background: var(--youtube); border-color: var(--youtube); color: white; }

    .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 12px; padding: 4px; }
    .tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; color: var(--text2); }
    .tab.active { background: var(--accent); color: #fff; }
    .panel { display: none; }
    .panel.active { display: block; }
    
    .filters { background: var(--surface); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .music-list { display: flex; flex-direction: column; gap: 4px; background: var(--surface); border-radius: 12px; padding: 6px; }
    
    .music-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-radius: 8px; border-bottom: 1px solid #1c1c1c; gap: 10px; }
    .music-row.playing { background: var(--surface2); border-left: 3px solid var(--accent); }
    .row-main { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; cursor: pointer; }
    .row-cover { width: 46px; height: 46px; border-radius: 6px; object-fit: cover; }
    .row-details { min-width: 0; display: flex; flex-direction: column; gap: 2px; }
    .row-title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-artist { color: var(--text2); font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .row-actions { display: flex; gap: 4px; }
    .row-btn { background: var(--surface2); border: none; color: var(--text); width: 34px; height: 34px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid var(--accent); color: #fff; padding: 8px 18px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1050; font-size: 0.85rem; }
    .toast.show { opacity: 1; }
    .spinner { text-align: center; padding: 20px; }
    .spinner::after { content: ''; display: inline-block; width: 24px; height: 24px; border: 2px solid var(--accent); border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .playlist-box { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .playlist-creation { display: flex; gap: 8px; width: 100%; }
    .playlist-creation select { padding: 10px; border-radius: 8px; border: none; background: var(--surface2); color: var(--text); font-size: 0.9rem; cursor: pointer; flex: 1; }
    .playlist-creation button { background: var(--accent); border: none; color: white; padding: 0 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .playlist-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 6px; margin-bottom: 6px; font-size: 0.9rem; }
    .playlist-track { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 4px 0; color: var(--text2); }

    .bottom-player { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 2px solid var(--accent); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; }
    .player-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .player-info img { width: 42px; height: 42px; border-radius: 6px; }
    .player-text { min-width: 0; }
    .player-text .title { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-text .artist { font-size: 0.75rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-controls { display: flex; align-items: center; gap: 10px; }
    .player-btn { background: var(--accent); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .player-btn.secondary { background: var(--surface2); color: var(--text); width: 34px; height: 34px; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>📡 DJ Radar</h1>
  </header>

  <div class="key-panel">
    <label for="youtubeKeyInput">🔑 CONEXÃO YOUTUBE CHARTS (API KEY)</label>
    <div class="key-box">
      <input type="password" id="youtubeKeyInput" placeholder="Cole sua chave v3 aqui...">
      <button id="saveKeyBtn">Conectar</button>
    </div>
  </div>

  <div class="search-container">
    <div class="search-box">
      <input type="text" id="manualSearchInput" placeholder="🔍 Buscar música, ano clássico ou ritmo...">
      <select id="genreFilter">
        <option value="">🎯 Todos os Gêneros</option>
        <option value="Funk"> Funk</option>
        <option value="Sertanejo">🤠 Sertanejo</option>
        <option value="Eletrônica">🪩 Eletrônica</option>
        <option value="Piseiro">🎹 Piseiro / Forró</option>
        <option value="Pagode">🥁 Pagode</option>
        <option value="Axé">🎭 Axé</option>
        <option value="Pop">🎤 Pop</option>
        <option value="Rock">🎸 Rock</option>
      </select>
      <button id="manualSearchBtn">Buscar</button>
    </div>
  </div>

  <div class="control-bar">
    <button class="control-btn active" id="btnHits">🔥 Hits do Momento (YT)</button>
    <button class="control-btn" id="btnOportunidades">🚀 Oportunidades Virais</button>
    <select class="control-btn" id="timeFilter">
      <option value="7">⏱️ Últimos 7 Dias</option>
      <option value="30" selected>⏱️ Últimos 30 Dias</option>
      <option value="90">⏱️ Últimos 90 Dias</option>
      <option value="365">⏱️ Último Ano</option>
    </select>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="oportunidades">📊 YouTube Live Charts</div>
    <div class="tab" data-tab="hits">🔍 Pesquisa Geral</div>
    <div class="tab" data-tab="playlists">🎵 Meus Sets</div>
  </div>

  <div id="oportunidades" class="panel active">
    <div class="filters">
      <span id="trendCriteriaTitle" style="font-size: 0.8rem; color: var(--text2);">🔒 Insira a chave acima para ativar os dados do YouTube.</span>
      <button id="refreshOpp" style="background: var(--surface2); border: none; color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer;">🔄 Atualizar</button>
    </div>
    <div id="oppList" class="music-list"></div>
  </div>

  <div id="hits" class="panel">
    <div class="filters">
      <span id="hitsTitle" style="font-size: 0.8rem; color: var(--text2);">Pronto para pesquisas profissionais</span>
    </div>
    <div id="hitsList" class="music-list"><p style="text-align:center;color:#888;font-size:0.85rem;padding:20px;">Use a barra superior.</p></div>
  </div>

  <div id="playlists" class="panel">
    <div class="playlist-box">
      <div class="playlist-creation">
        <select id="newPlaylistName">
          <option value="">📂 Selecione o Evento...</option>
          <option value="Casamento">💍 Casamento</option>
          <option value="Aniversário">🎂 Aniversário</option>
          <option value="Boteco">🍺 Boteco</option>
          <option value="Balada">🪩 Balada</option>
          <option value="Formatura">🎓 Formatura</option>
          <option value="Churrasco">🥩 Churrasco</option>
        </select>
        <button id="createPlaylistBtn">Criar Set</button>
      </div>
    </div>
    <div id="playlistsList"></div>
  </div>

  <div id="toast" class="toast"></div>
</div>

<div class="bottom-player">
  <div class="player-info">
    <img id="playerCover" src="https://i.imgur.com/3nFjQ4o.png" alt="">
    <div class="player-text">
      <div class="title" id="playerTitle">Nenhuma faixa tocando</div>
      <div class="artist" id="playerArtist">Selecione uma música</div>
    </div>
  </div>
  <div class="player-controls">
    <button class="player-btn" id="playerPlayPauseBtn">▶</button>
    <button class="player-btn secondary" id="playerNextBtn">⏭</button>
  </div>
</div>

</body>
</html>
