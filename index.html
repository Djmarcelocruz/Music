<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DJ Radar – Descoberta Musical</title>
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22DJ%20Radar%22%2C%22short_name%22%3A%22Radar%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0a%22%2C%22theme_color%22%3A%22%23ff5500%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'50'%20fill%3D'%23ff5500'%2F%3E%3Ctext%20x%3D'50'%20y%3D'65'%20text-anchor%3D'middle'%20fill%3D'white'%20font-size%3D'40'%3E%E2%99%AB%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --text: #e0e0e0;
      --text2: #aaa;
      --accent: #ff5500;
      --accent2: #ff7b33;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; padding-bottom: 110px; }
    .app { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
    header { display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 1.6rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), #ffaa00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .search-container { display: flex; flex-direction: column; gap: 8px; background: var(--surface); padding: 12px; border-radius: 14px; }
    .search-box { display: flex; gap: 8px; flex-wrap: wrap; }
    .search-box input { flex: 2; min-width: 180px; padding: 10px; border-radius: 10px; border: none; background: var(--surface2); color: var(--text); font-size: 0.95rem; }
    .search-box input:focus, .search-box select:focus { outline: 2px solid var(--accent); }
    .search-box select { flex: 1; min-width: 130px; padding: 10px; border-radius: 10px; border: none; background: var(--surface2); color: var(--text); font-size: 0.85rem; cursor: pointer; }
    .search-box button { background: var(--accent); color: white; border: none; padding: 0 16px; height: 42px; border-radius: 10px; font-weight: 600; cursor: pointer; }

    .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 12px; padding: 4px; }
    .tab { flex: 1; text-align: center; padding: 8px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; color: var(--text2); }
    .tab.active { background: var(--accent); color: #fff; }
    .panel { display: none; }
    .panel.active { display: block; }
    
    .filters { background: var(--surface); border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    
    .music-list { display: flex; flex-direction: column; gap: 4px; background: var(--surface); border-radius: 12px; padding: 6px; }
    .music-row { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-radius: 8px; background: transparent; border-bottom: 1px solid #1c1c1c; gap: 10px; }
    .music-row.playing { background: var(--surface2); border-left: 3px solid var(--accent); }
    .music-row:last-child { border-bottom: none; }
    
    .row-main { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; cursor: pointer; }
    .row-cover { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; }
    .row-details { min-width: 0; display: flex; flex-direction: column; }
    .row-title { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-artist { color: var(--text2); font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .row-bpm { font-size: 0.7rem; color: var(--accent2); margin-top: 2px; font-weight: 500; }
    
    .row-actions { display: flex; gap: 4px; }
    .row-btn { background: var(--surface2); border: none; color: var(--text); width: 32px; height: 32px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid var(--accent); color: #fff; padding: 8px 18px; border-radius: 20px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1050; font-size: 0.85rem; }
    .toast.show { opacity: 1; }
    .spinner { text-align: center; padding: 20px; }
    .spinner::after { content: ''; display: inline-block; width: 24px; height: 24px; border: 2px solid var(--accent); border-top: 2px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .playlist-box { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
    .playlist-creation { display: flex; gap: 8px; width: 100%; }
    .playlist-creation input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: var(--surface2); color: var(--text); font-size: 0.9rem; }
    .playlist-creation button { background: var(--accent); border: none; color: white; padding: 0 14px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    .playlist-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 6px; margin-bottom: 6px; font-size: 0.9rem; }
    .playlist-track { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 4px 0; color: var(--text2); }

    .bottom-player { position: fixed; bottom: 0; left: 0; right: 0; background: #111; border-top: 2px solid var(--accent); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; box-shadow: 0 -4px 15px rgba(0,0,0,0.8); }
    .player-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .player-info img { width: 42px; height: 42px; border-radius: 6px; }
    .player-text { min-width: 0; }
    .player-text .title { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-text .artist { font-size: 0.75rem; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-controls { display: flex; align-items: center; gap: 10px; margin-left: 12px; }
    .player-btn { background: var(--accent); color: white; border: none; width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.95rem; }
    .player-btn.secondary { background: var(--surface2); color: var(--text); width: 34px; height: 34px; font-size: 0.85rem; }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>📡 DJ Radar</h1>
  </header>

  <div class="search-container">
    <div class="search-box">
      <input type="text" id="manualSearchInput" placeholder="🔍 Música, artista ou ritmo...">
      <select id="genreFilter">
        <option value="">🎯 Todos os Estilos</option>
        <option value="Funk 2026">🔥 Funk Atual</option>
        <option value="Mega Funk">🔊 Mega Funk</option>
        <option value="Sertanejo 2026">🤠 Sertanejo Universitário</option>
        <option value="Eletronica">🪩 Eletrônica</option>
        <option value="Pagode">🥁 Pagode</option>
      </select>
      <button id="manualSearchBtn">Buscar</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="hits">🔍 Busca Direta</div>
    <div class="tab" data-tab="oportunidades">📈 Tendências (Redes)</div>
    <div class="tab" data-tab="playlists">🎵 Meus Sets</div>
  </div>

  <div id="hits" class="panel active">
    <div class="filters">
      <span id="hitsTitle" style="font-size: 0.8rem; color: var(--text2);">Pronto para pesquisar</span>
    </div>
    <div id="hitsList" class="music-list"><p style="text-align:center;color:#888;font-size:0.85rem;padding:20px;">Digite um termo acima para buscar lançamentos.</p></div>
  </div>

  <div id="oportunidades" class="panel">
    <div class="filters">
      <span id="trendCriteriaTitle" style="font-size: 0.8rem; color: var(--text2);">🔥 Carregando hits reais...</span>
      <button id="refreshOpp" style="background: var(--surface2); border: none; color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer;">🔄 Alternar Trend</button>
    </div>
    <div id="oppList" class="music-list"><div class="spinner"></div></div>
  </div>

  <div id="playlists" class="panel">
    <div class="playlist-box">
      <div class="playlist-creation">
        <input type="text" id="newPlaylistName" placeholder="Nome do novo Set (ex: Pista Funk)">
        <button id="createPlaylistBtn">Criar Set</button>
      </div>
    </div>
    <div id="playlistsList"></div>
  </div>

  <div id="toast" class="toast"></div>
</div>

<div class="bottom-player">
  <div class="player-info">
    <img id="playerCover" src="https://i.imgur.com/3nFjQ4o.png" alt="">
    <div class="player-text">
      <div class="title" id="playerTitle">Nenhuma música tocando</div>
      <div class="artist" id="playerArtist">Selecione uma faixa</div>
    </div>
  </div>
  <div class="player-controls">
    <button class="player-btn" id="playerPlayPauseBtn">▶</button>
    <button class="player-btn secondary" id="playerNextBtn">⏭</button>
  </div>
</div>

<script>
(function() {
  let activeList = []; 
  let currentTrackIndex = -1;
  let playlists = JSON.parse(localStorage.getItem('djradar_playlists') || '[]');
  
  const audioContext = new Audio();
  const $ = (sel) => document.querySelector(sel);
  
  const toast = (msg, dur=2000) => {
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  };

  function calcularBpmEstimado(titulo, artista) {
    const texto = `${titulo} ${artista}`.toLowerCase();
    if (texto.includes('funk') || texto.includes('mtg')) return '⏱️ ~130 - 140 BPM (Funk)';
    if (texto.includes('mega') || texto.includes('electro')) return '⏱️ ~145 - 150 BPM (Mega)';
    if (texto.includes('remix') || texto.includes('eletronica') || texto.includes('house')) return '⏱️ ~124 - 128 BPM (Eletrônica)';
    if (texto.includes('sertanejo') || texto.includes('piseiro') || texto.includes('hits')) return '⏱️ ~120 - 130 BPM (Sertanejo/Pop)';
    if (texto.includes('pagode') || texto.includes('samba')) return '⏱️ ~90 - 110 BPM (Pagode)';
    return '⏱️ Ritmo de Pista (Variável)';
  }

  async function buscarNoiTunes(termo, limite = 30) {
    const url = `https://itunes.apple.com/search?term=${encodeURIComponent(termo)}&media=music&limit=${limite}&country=BR`;
    const res = await fetch(url);
    if (!res.ok) throw new Error();
    const data = await res.json();
    
    return data.results.map(item => ({
      id: item.trackId.toString(),
      title: item.trackName,
      artist: item.artistName,
      albumCover: item.artworkUrl100.replace('100x100bb', '300x300bb'),
      preview: item.previewUrl,
      bpm: calcularBpmEstimado(item.trackName, item.artistName)
    }));
  }

  // SOLUÇÃO: CONTEXTO DE BUSCA REAL BASEADO EM TERMOS QUENTES DO BRASIL
  const termosTendencia = ["Top Hits Brasil", "Funk 2026", "MTG", "Piseiro 2026"];
  let indiceTermoAtual = 0;

  async function carregarTendenciasUnificadas() {
    const list = $('#oppList');
    list.innerHTML = '<div class="spinner"></div>';
    
    // Pega o termo atual para buscar dados reais de sucesso
    const termoAtual = termosTendencia[indiceTermoAtual];
    $('#trendCriteriaTitle').textContent = `📈 Base: ${termoAtual} (Reais)`;

    try {
      const resultados Reais = await buscarNoiTunes(termoAtual, 25);
      
      const termosViraisRedes = ["funk", "mtg", "remix", "piseiro", "teto", "luan", "matue", "anitta", "luisa"];

      activeList = resultadosReais.map((track, index) => {
        const stringBusca = `${track.title} ${track.artist}`.toLowerCase();
        const possuiFatorViral = termosViraisRedes.some(termo => stringBusca.includes(termo)) || index < 6;
        
        // Adiciona o marcador compacto discutido nas faixas de maior engajamento
        const tituloFinal = possuiFatorViral ? `📱 ${track.title}` : track.title;

        return {
          ...track,
          title: tituloFinal
        };
      });

      renderTrackList(list, activeList, true);
      
      // Rotaciona o termo para a próxima vez que o DJ atualizar
      indiceTermoAtual = (indiceTermoAtual + 1) % termosTendencia.length;
    } catch(e) {
      list.innerHTML = `<p style="color:red;text-align:center;font-size:0.85rem;padding:10px;">Erro ao carregar tendências reais.</p>`;
    }
  }

  async function executarBuscaManual() {
    const textoDigitado = $('#manualSearchInput').value.trim();
    const estiloSelecionado = $('#genreFilter').value;
    
    let termoFinal = textoDigitado && estiloSelecionado ? `${textoDigitado} ${estiloSelecionado}` : estiloSelecionado || textoDigitado;
    if (termoFinal && !termoFinal.includes('2026')) {
      termoFinal += " 2026";
    }

    if (!termoFinal) { toast('Digite uma música ou estilo!'); return; }

    const list = $('#hitsList');
    $('#hitsTitle').textContent = `Resultados para: "${textoDigitado || estiloSelecionado}"`;
    list.innerHTML = '<div class="spinner"></div>';
    mudarAbaPara('hits');

    try {
      activeList = await buscarNoiTunes(termoFinal);
      renderTrackList(list, activeList, false);
    } catch(e) {
      list.innerHTML = `<p style="color:red;text-align:center;font-size:0.85rem;padding:10px;">Erro ao buscar dados.</p>`;
    }
  }

  function mudarAbaPara(tabName) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    $('#' + tabName).classList.add('active');
  }

  function renderTrackList(container, tracks, esOportunidades) {
    if (!tracks.length) { container.innerHTML = '<p style="text-align:center;color:#888;font-size:0.85rem;padding:10px;">Nenhuma faixa encontrada.</p>'; return; }
    
    container.innerHTML = tracks.map((t, idx) => {
      const isActiva = currentTrackIndex === idx;
      return `
        <div class="music-row ${isActiva ? 'playing' : ''}" id="row-${idx}">
          <div class="row-main" onclick="tocarFaixa(${idx})">
            <img class="row-cover" src="${t.albumCover}" alt="">
            <div class="row-details">
              <div class="row-title">${t.title}</div>
              <div class="row-artist">${t.artist}</div>
              <div class="row-bpm">${t.bpm}</div>
            </div>
          </div>
          <div class="row-actions">
            <button class="row-btn" onclick="abrirModalAdicionar('${t.id}')" title="Adicionar ao Set">➕</button>
          </div>
        </div>`;
    }).join('');
  }

  function tocarFaixa(index) {
    if (index < 0 || index >= activeList.length) return;

    currentTrackIndex = index;
    const track = activeList[index];

    document.querySelectorAll('.music-row').forEach(r => r.classList.remove('playing'));
    const rowAtual = $(`#row-${index}`);
    if (rowAtual) rowAtual.classList.add('playing');

    if (!track.preview) {
      tocarFaixa(index + 1);
      return;
    }

    $('#playerCover').src = track.albumCover;
    $('#playerTitle').textContent = track.title;
    $('#playerArtist').textContent = track.artist;
    $('#playerPlayPauseBtn').textContent = "⏸";

    audioContext.src = track.preview;
    audioContext.play().catch(() => tocarFaixa(index + 1));
  }

  audioContext.onended = function() {
    let proximaFaixa = currentTrackIndex + 1;
    if (proximaFaixa >= activeList.length) {
      proximaFaixa = 0; 
      toast("Loop: Voltando ao início da lista! 🔄");
    }
    tocarFaixa(proximaFaixa);
  };

  $('#playerPlayPauseBtn').addEventListener('click', () => {
    if (audioContext.src) {
      if (audioContext.paused) {
        audioContext.play();
        $('#playerPlayPauseBtn').textContent = "⏸";
      } else {
        audioContext.pause();
        $('#playerPlayPauseBtn').textContent = "▶";
      }
    }
  });

  $('#playerNextBtn').addEventListener('click', () => {
    let proximaFaixa = currentTrackIndex + 1;
    if (proximaFaixa >= activeList.length) proximaFaixa = 0;
    tocarFaixa(proximaFaixa);
  });

  $('#createPlaylistBtn').addEventListener('click', () => {
    const nome = $('#newPlaylistName').value.trim();
    if (!nome) { toast('Digite o nome do set!'); return; }
    if (playlists.some(p => p.name.toLowerCase() === nome.toLowerCase())) { toast('Esse set já existe!'); return; }
    
    playlists.push({ name: nome, tracks: [] });
    localStorage.setItem('djradar_playlists', JSON.stringify(playlists));
    $('#newPlaylistName').value = '';
    renderPlaylists();
    toast(`Set "${nome}" criado!`);
  });

  window.abrirModalAdicionar = function(trackId) {
    if (!playlists.length) { toast('Crie um Set na aba "Meus Sets" primeiro!'); return; }
    
    let opcoes = playlists.map((p, i) => `${i + 1}: ${p.name}`).join('\n');
    let escolha = prompt(`Digite o número do Set para salvar a música:\n\n${opcoes}`);
    
    if (!escolha) return;
    let idx = parseInt(escolha) - 1;
    
    if (playlists[idx]) {
      const track = activeList.find(t => t.id === trackId);
      if (!track) return;
      
      if (playlists[idx].tracks.some(t => t.id === trackId)) { toast('Essa track já está no Set!'); return; }
      
      playlists[idx].tracks.push(track);
      localStorage.setItem('djradar_playlists', JSON.stringify(playlists));
      toast(`Salva em: ${playlists[idx].name}`);
    } else {
      toast('Número inválido.');
    }
  };

  function renderPlaylists() {
    const container = $('#playlistsList');
    if (!playlists.length) { container.innerHTML = '<p style="text-align:center;color:#888;font-size:0.85rem;padding:15px;">Nenhum set criado no celular.</p>'; return; }
    
    container.innerHTML = playlists.map((pl, i) => `
      <div class="playlist-box">
        <div class="playlist-header">
          <strong>📂 ${pl.name}</strong>
          <span style="color:var(--text2);font-size:0.75rem;">${pl.tracks.length} tracks</span>
          <button onclick="deletarPlaylist(${i})" style="background:none;border:none;color:#ff3333;font-size:0.75rem;cursor:pointer;">Excluir</button>
        </div>
        <div style="max-height:120px; overflow-y:auto; margin-bottom:8px;">
          ${pl.tracks.map((t, idx) => `
            <div class="playlist-track">
              <span>${idx+1}. ${t.artist} - ${t.title}</span>
              <button onclick="removerFaixa(${i}, ${idx})" style="background:none;border:none;color:#ff5500;font-size:0.7rem;cursor:pointer;">❌</button>
            </div>
          `).join('') || '<p style="font-size:0.75rem;color:#555;padding:4px 0;">Set vazio.</p>'}
        </div>
        <div style="display:flex; gap:6px;">
          <button onclick="copiarTxtSet(${i})" style="flex:1; padding:6px; background:var(--surface2); border:1px solid #444; color:white; border-radius:6px; font-size:0.72rem; cursor:pointer;">📋 Copiar Lista</button>
          <button onclick="exportarArquivoM3U(${i})" style="flex:1; padding:6px; background:var(--accent); border:none; color:white; border-radius:6px; font-size:0.72rem; font-weight:600; cursor:pointer;">💾 Exportar .M3U</button>
        </div>
      </div>
    `).join('');
  }

  window.exportarArquivoM3U = function(idx) {
    const pl = playlists[idx];
    if (!pl.tracks.length) { toast('Adicione tracks ao seu Set primeiro!'); return; }
    
    let m3uConteudo = "#EXTM3U\n";
    pl.tracks.forEach(t => {
      m3uConteudo += `#EXTINF:-1,${t.artist} - ${t.title}\n${t.preview || ''}\n`;
    });
    
    const blob = new Blob([m3uConteudo], { type: "audio/x-mpegurl" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = `${pl.name.replace(/\s+/g, '_')}_Set.m3u`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    toast(".M3U Baixado!");
  };

  window.deletarPlaylist = function(idx) {
    if(confirm(`Apagar o set "${playlists[idx].name}"?`)) {
      playlists.splice(idx, 1);
      localStorage.setItem('djradar_playlists', JSON.stringify(playlists));
      renderPlaylists();
    }
  };

  window.removerFaixa = function(pIdx, tIdx) {
    playlists[pIdx].tracks.splice(tIdx, 1);
    localStorage.setItem('djradar_playlists', JSON.stringify(playlists));
    renderPlaylists();
  };

  window.copiarTxtSet = function(idx) {
    const pl = playlists[idx];
    if (!pl.tracks.length) { toast('Set vazio!'); return; }
    let textoLimpo = pl.tracks.map((t, i) => `${i + 1}. ${t.artist} - ${t.title}`).join('\n');
    navigator.clipboard.writeText(textoLimpo)
      .then(() => toast('Lista copiada!'))
      .catch(() => toast('Erro ao copiar.'));
  };

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      mudarAbaPara(tab.dataset.tab);
      if (tab.dataset.tab === 'oportunidades') carregarTendenciasUnificadas();
      if (tab.dataset.tab === 'playlists') renderPlaylists();
    });
  });

  $('#manualSearchBtn').addEventListener('click', executarBuscaManual);
  $('#manualSearchInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') executarBuscaManual(); });
  $('#refreshOpp').addEventListener('click', carregarTendenciasUnificadas);

})();
</script>
</body>
</html>
