<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DJ Radar – Descoberta Musical</title>
  <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22DJ%20Radar%22%2C%22short_name%22%3A%22Radar%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0a%22%2C%22theme_color%22%3A%22%23ff5500%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20viewBox%3D'0%200%20100%20100'%3E%3Ccircle%20cx%3D'50'%20cy%3D'50'%20r%3D'50'%20fill%3D'%23ff5500'%2F%3E%3Ctext%20x%3D'50'%20y%3D'65'%20text-anchor%3D'middle'%20fill%3D'white'%20font-size%3D'40'%3E%E2%99%AB%3C%2Ftext%3E%3C%2Fsvg%3E%22%2C%22sizes%22%3A%22100x100%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --text: #e0e0e0;
      --text2: #aaa;
      --accent: #ff5500;
      --accent2: #ff7b33;
      --star: #ffd600;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; }
    .app { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; }
    h1 { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), #ffaa00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .tabs { display: flex; gap: 4px; background: var(--surface); border-radius: 20px; padding: 4px; }
    .tab { flex: 1; text-align: center; padding: 10px; border-radius: 16px; cursor: pointer; font-weight: 600; font-size: 0.9rem; transition: 0.2s; }
    .tab.active { background: var(--accent); color: #fff; }
    .panel { display: none; }
    .panel.active { display: block; }
    .filters { background: var(--surface); border-radius: 16px; padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .filters select, .filters input { padding: 8px 12px; border-radius: 10px; border: none; background: var(--surface2); color: var(--text); font-size: 0.85rem; }
    .music-list { display: flex; flex-direction: column; gap: 12px; }
    .music-card { background: var(--surface); border-radius: 16px; padding: 16px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; transition: 0.2s; border-left: 4px solid transparent; }
    .music-card:hover { border-left-color: var(--accent); background: var(--surface2); }
    .music-cover { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
    .music-info { flex: 1; min-width: 200px; }
    .music-title { font-weight: 700; font-size: 1rem; }
    .music-artist { color: var(--text2); font-size: 0.85rem; }
    .music-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; font-size: 0.7rem; }
    .badge { background: var(--surface2); padding: 2px 8px; border-radius: 20px; white-space: nowrap; }
    .stars { color: var(--star); }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .actions button { background: var(--surface2); border: none; color: var(--text); padding: 6px 12px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; }
    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 30px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
    .spinner { text-align: center; padding: 30px; }
    .spinner::after { content: ''; display: inline-block; width: 30px; height: 30px; border: 3px solid var(--accent); border-top: 3px solid transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .playlist-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; }
    @media (max-width: 500px) { .music-card { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>📡 DJ Radar</h1>
  </header>

  <div class="tabs">
    <div class="tab active" data-tab="hits">🔥 Hits do Momento</div>
    <div class="tab" data-tab="oportunidades">📈 Oportunidades</div>
    <div class="tab" data-tab="playlists">🎵 Playlists</div>
  </div>

  <div id="hits" class="panel active">
    <div class="filters">
      <select id="hitsPeriod">
        <option value="7">Últimos 7 dias</option>
        <option value="30" selected>Últimos 30 dias</option>
        <option value="90">Últimos 90 dias</option>
      </select>
      <button id="refreshHits" class="btn-secondary">🔄 Atualizar</button>
    </div>
    <div id="hitsList" class="music-list"><div class="spinner"></div></div>
  </div>

  <div id="oportunidades" class="panel">
    <div class="filters">
      <select id="oppPeriod">
        <option value="30">Últimos 30 dias</option>
        <option value="90" selected>Últimos 90 dias</option>
      </select>
      <button id="refreshOpp" class="btn-secondary">🔄 Atualizar</button>
    </div>
    <div id="oppList" class="music-list"><div class="spinner"></div></div>
  </div>

  <div id="playlists" class="panel">
    <div class="filters">
      <select id="playlistTemplate">
        <option value="">Criar playlist...</option>
        <option value="Casamento">💒 Casamento</option>
        <option value="Boteco">🍺 Boteco</option>
        <option value="Balada">🪩 Balada</option>
      </select>
      <button id="createPlaylistBtn" class="btn-primary">Nova Playlist</button>
    </div>
    <div id="playlistsList"></div>
  </div>

  <div id="toast" class="toast"></div>
</div>

<script>
(function() {
  let currentHits = [], currentOpps = [];
  let playlists = JSON.parse(localStorage.getItem('djradar_playlists') || '[]');

  const $ = (sel) => document.querySelector(sel);
  const toast = (msg, dur=2500) => {
    const t = $('#toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  };

  async function seguroFetch(url) {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  }

  function mapearTrack(track) {
    const item = track.track || track;
    const releaseDate = item.release_date || item.album?.release_date || '2026-01-01';
    const ageDays = Math.max(1, (Date.now() - new Date(releaseDate).getTime()) / 86400000);
    
    const rawRank = item.rank || 500000;
    const popularity = Math.min(100, Math.max(10, Math.round((rawRank / 1000000) * 100)));

    let nota = 3;
    if (popularity > 85) nota = 5;
    else if (popularity > 70) nota = 4;
    else if (popularity > 40) nota = 3;

    const uso = popularity > 80 && ageDays < 180 ? 'Pico da festa 🔥' : 'Manter pista cheia 🎶';

    return {
      id: item.id,
      title: item.title_short || item.title,
      artist: item.artist?.name || 'Artista desconhecido',
      albumCover: item.album?.cover_medium || '',
      preview: item.preview,
      deezerUrl: item.link,
      releaseDate,
      popularity,
      nota,
      uso,
      ageDays: Math.round(ageDays)
    };
  }

  async function loadHits(days=30) {
    const list = $('#hitsList');
    list.innerHTML = '<div class="spinner"></div>';
    try {
      const data = await seguroFetch('/api/hits');
      if (!data?.tracks?.data) throw new Error('Formato inválido');
      let tracks = data.tracks.data.map(mapearTrack);
      currentHits = tracks;
      renderTrackList(list, currentHits);
    } catch(e) {
      list.innerHTML = '<p style="color:red;text-align:center;">Erro ao carregar hits.</p>';
    }
  }

  async function loadOportunidades(days=90) {
    const list = $('#oppList');
    list.innerHTML = '<div class="spinner"></div>';
    try {
      const data = await seguroFetch('/api/oportunidades');
      if (!data?.data) throw new Error('Formato inválido');
      let tracks = data.data.map(mapearTrack);
      
      tracks.sort((a, b) => (b.popularity / (b.ageDays * 0.1 + 1)) - (a.popularity / (a.ageDays * 0.1 + 1)));
      
      currentOpps = tracks;
      renderTrackList(list, currentOpps);
    } catch(e) {
      list.innerHTML = '<p style="color:red;text-align:center;">Erro ao carregar oportunidades.</p>';
    }
  }

  function renderTrackList(container, tracks) {
    if (!tracks.length) { container.innerHTML = '<p style="text-align:center;color:#888;">Nenhuma música.</p>'; return; }
    container.innerHTML = tracks.map(t => {
      const stars = '⭐'.repeat(t.nota) + '☆'.repeat(5 - t.nota);
      
      // Escapa aspas simples para evitar quebras no onClick JavaScript
      const tituloEscapado = t.title.replace(/'/g, "\\'");
      const artistaEscapado = t.artist.replace(/'/g, "\\'");

      return `
        <div class="music-card">
          <img class="music-cover" src="${t.albumCover || 'https://i.imgur.com/3nFjQ4o.png'}" alt="">
          <div class="music-info">
            <div class="music-title">${t.title}</div>
            <div class="music-artist">${t.artist}</div>
            <div class="music-meta">
              <span class="badge">📅 ${t.releaseDate}</span>
              <span class="badge">📊 Pop: ${t.popularity}%</span>
              <span class="badge">${t.uso}</span>
            </div>
            <div class="stars" style="margin-top:4px;">${stars}</div>
          </div>
          <div class="actions">
            <button onclick="playPreview('${t.preview}')" ${!t.preview?'disabled':''}>▶ Prévia</button>
            <button onclick="window.open('${t.deezerUrl}','_blank')">🎧 Deezer</button>
            <button onclick="verClipeNoYouTube('${tituloEscapado}', '${artistaEscapado}')">🎬 Clipe</button>
            <button onclick="addToPlaylist('${t.id}')">➕ Playlist</button>
          </div>
        </div>`;
    }).join('');
  }

  window.playPreview = function(url) {
    if (!url) return;
    const audio = new Audio(url);
    audio.play().catch(() => toast('Prévia indisponível'));
  };

  window.verClipeNoYouTube = async function(titulo, artista) {
    toast('Buscando clipe no YouTube...');
    try {
      const termoBusca = `${artista} - ${titulo}`;
      const resposta = await fetch(`/api/youtube?q=${encodeURIComponent(termoBusca)}`);
      if (!resposta.ok) throw new Error('Erro ao buscar vídeo');
      
      const dados = await resposta.json();
      
      if (dados.videoUrl) {
        window.open(dados.videoUrl, '_blank');
      } else {
        toast('Clipe não encontrado.');
      }
    } catch (erro) {
      console.error(erro);
      toast('Erro ao conectar com o YouTube.');
    }
  };

  window.addToPlaylist = function(trackId) {
    const playlistName = $('#playlistTemplate').value;
    if (!playlistName) { toast('Selecione uma playlist'); return; }
    const track = [...currentHits, ...currentOpps].find(t => t.id == trackId);
    if (!track) return;
    let playlist = playlists.find(p => p.name === playlistName);
    if (!playlist) {
      playlist = { name: playlistName, tracks: [] };
      playlists.push(playlist);
    }
    if (playlist.tracks.some(t => t.id == trackId)) { toast('Música já está na playlist'); return; }
    playlist.tracks.push(track);
    localStorage.setItem('djradar_playlists', JSON.stringify(playlists));
    toast(`Adicionada a "${playlistName}"`);
    renderPlaylists();
  };

  function renderPlaylists() {
    const container = $('#playlistsList');
    if (!playlists.length) { container.innerHTML = '<p style="text-align:center;color:#888;">Nenhuma playlist criada.</p>'; return; }
    container.innerHTML = playlists.map((pl, i) => `
      <div style="margin-bottom:16px; background:var(--surface); padding:12px; border-radius:12px;">
        <div class="playlist-item">
          <strong>${pl.name}</strong> (${pl.tracks.length} músicas)
          <button onclick="deletePlaylist(${i})" class="btn-secondary" style="padding:4px 10px;">🗑️</button>
        </div>
        <div style="margin-top:8px;">
          <button onclick="exportPlaylist(${i}, 'txt')" class="btn-primary" style="font-size:0.8rem; padding:4px 8px;">📋 Copiar TXT</button>
        </div>
      </div>
    `).join('');
  }

  window.deletePlaylist = function(idx) {
    playlists.splice(idx, 1);
    localStorage.setItem('djradar_playlists', JSON.stringify(playlists));
    renderPlaylists();
  };

  window.exportPlaylist = function(idx, type) {
    const pl = playlists[idx];
    if (!pl || !pl.tracks.length) return toast('Playlist vazia');
    let content = pl.tracks.map((t,i) => `${i+1}. ${t.artist} - ${t.title}`).join('\n');
    
    navigator.clipboard.writeText(content);
    toast('Lista copiada para a área de transferência!');
  };

  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', ()=> {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      $('#' + tab.dataset.tab).classList.add('active');
      if (tab.dataset.tab === 'hits' && !currentHits.length) loadHits();
      if (tab.dataset.tab === 'oportunidades' && !currentOpps.length) loadOportunidades();
      if (tab.dataset.tab === 'playlists') renderPlaylists();
    });
  });

  $('#refreshHits').addEventListener('click', () => loadHits());
  $('#refreshOpp').addEventListener('click', () => loadOportunidades());

  loadHits();
  renderPlaylists();
})();
</script>
</body>
</html>
